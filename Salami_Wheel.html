<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eid Salami Wheel - Golden Theme</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        :root {
            /* Islamic Golden Theme Colors */
            --bg-dark: #0a1815; 
            --gold-main: #d4af37;
            --gold-light: #f9d976;
            --gold-dark: #aa7c11;
            --wheel-green: #113326;
            --wheel-red: #3a1515;
            --text-color: #fcfcfc;
        }

        body {
            background-color: var(--bg-dark);
            background-image: radial-gradient(circle at center, #112922 0%, #0a1815 100%);
            color: var(--text-color);
            font-family: 'Amiri', serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            overflow-x: hidden; /* Prevent horizontal scroll, allow vertical if needed */
            position: relative;
        }

        /* Subtle Geometric Background "Graffiti" */
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            /* Islamic star/geometric SVG pattern */
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23d4af37' fill-opacity='0.06'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            z-index: -1;
            pointer-events: none;
        }

        .header-container {
            text-align: center;
            z-index: 1;
        }

        h1 {
            /* Scales between 2rem and 3rem based on screen width */
            font-size: clamp(2rem, 8vw, 3rem);
            color: var(--gold-light);
            text-shadow: 0 2px 4px rgba(0,0,0,0.8), 0 0 15px rgba(212, 175, 55, 0.5);
            margin: 0 0 5px 0;
            font-weight: 700;
            letter-spacing: 2px;
        }
        
        p {
            color: var(--gold-main);
            font-size: clamp(1rem, 4vw, 1.2rem);
            margin-bottom: 20px;
            opacity: 0.9;
        }

        /* Responsive Wheel Container */
        .wheel-container {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 90vw;
            max-width: 420px; /* Caps the size on desktop */
            aspect-ratio: 1 / 1; /* Keeps it a perfect circle */
            margin: 10px 0;
            border-radius: 50%;
            padding: 2%; /* Scales padding relative to size */
            background: linear-gradient(45deg, var(--gold-dark), var(--gold-light), var(--gold-dark));
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.3), inset 0 0 10px rgba(0,0,0,0.5);
            z-index: 1;
        }

        /* The canvas scales to fit the responsive container */
        #wheel {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background-color: var(--bg-dark);
            transition: transform 4s cubic-bezier(0.33, 1, 0.68, 1); 
        }

        /* The responsive pointer */
        .pointer {
            position: absolute;
            right: -5%; /* Scales position based on container width */
            top: 50%;
            transform: translateY(-50%);
            width: 0; 
            height: 0; 
            border-top: clamp(10px, 4vw, 18px) solid transparent;
            border-bottom: clamp(10px, 4vw, 18px) solid transparent;
            border-right: clamp(25px, 8vw, 40px) solid var(--gold-light);
            filter: drop-shadow(-2px 2px 4px rgba(0,0,0,0.8));
            z-index: 10;
        }

        button {
            background: linear-gradient(135deg, var(--gold-dark), var(--gold-main));
            color: #000;
            border: 2px solid var(--gold-light);
            padding: 12px clamp(20px, 5vw, 45px);
            font-size: clamp(1.2rem, 5vw, 1.5rem);
            font-family: 'Amiri', serif;
            font-weight: bold;
            cursor: pointer;
            border-radius: 50px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.6), inset 0 0 10px rgba(255,255,255,0.4);
            transition: all 0.3s ease;
            margin-top: 20px;
            z-index: 1;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(212, 175, 55, 0.5), inset 0 0 15px rgba(255,255,255,0.6);
            background: linear-gradient(135deg, var(--gold-main), var(--gold-light));
        }

        button:disabled {
            background: #2a3330;
            border-color: #4a5550;
            color: #7a8880;
            box-shadow: none;
            cursor: not-allowed;
            transform: none;
        }

        /* --- POPUP / MODAL CSS --- */
        .modal-overlay {
            display: none; 
            position: fixed; 
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.8); 
            backdrop-filter: blur(5px); 
            z-index: 1000;
            justify-content: center; 
            align-items: center;
        }

        .modal-content {
            background: var(--bg-dark); 
            background-image: radial-gradient(circle at center, #112922 0%, #0a1815 100%);
            border: 3px solid var(--gold-main);
            border-radius: 15px; 
            width: 85%;
            max-width: 400px;
            padding: 40px 20px; 
            text-align: center;
            box-shadow: 0 0 40px rgba(212, 175, 55, 0.4), inset 0 0 20px rgba(212, 175, 55, 0.1);
            transform: scale(0.8); 
            opacity: 0; 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .modal-content.show {
            transform: scale(1); 
            opacity: 1;
        }

        .modal-content h2 {
            color: var(--gold-light);
            font-size: clamp(2rem, 8vw, 2.5rem);
            margin: 0 0 10px 0;
        }

        .modal-amount {
            font-size: clamp(2.5rem, 10vw, 3.5rem);
            color: #fff;
            font-weight: bold;
            margin: 15px 0;
            text-shadow: 0 0 15px var(--gold-main);
        }

        .close-btn {
            background: transparent;
            border: 1px solid var(--gold-main);
            color: var(--gold-main);
            padding: 8px 25px;
            font-size: 1.2rem;
            margin-top: 15px;
            box-shadow: none;
        }
        
        /* Secret Reset Button */
        #resetBtn {
            opacity: 0.1; position: absolute; bottom: 10px; right: 10px; 
            font-size: 0.8rem; padding: 5px 10px; border: 1px solid #fff; 
            color: #fff; background: transparent; box-shadow: none; border-radius: 4px; z-index: 100;
        }
    </style>
</head>
<body>

    <div class="header-container">
        <h1>Eid Mubarak</h1>
        <p>Spin the wheel to claim your Eid Salami.</p>
    </div>

    <div class="wheel-container">
        <canvas id="wheel" width="800" height="800"></canvas>
        <div class="pointer"></div>
    </div>

    <button id="spinBtn">Spin the Wheel</button>

    <div class="modal-overlay" id="resultModal">
        <div class="modal-content" id="modalBox">
            <h2>Masha'Allah!</h2>
            <p style="margin:0; font-size:1.2rem;">Your Eid Salami is</p>
            <div class="modal-amount" id="modalAmount">0.00 Tk</div>
            <button class="close-btn" id="closeModalBtn">Accept</button>
        </div>
    </div>

    <button id="resetBtn">Reset</button>

    <script>
        const canvas = document.getElementById('wheel');
        const ctx = canvas.getContext('2d');
        const spinBtn = document.getElementById('spinBtn');
        const resultModal = document.getElementById('resultModal');
        const modalBox = document.getElementById('modalBox');
        const modalAmount = document.getElementById('modalAmount');
        const closeModalBtn = document.getElementById('closeModalBtn');

        // Generate and Shuffle Options
        let options = [];
        for (let i = 0.25; i <= 10; i += 0.25) {
            options.push(i.toFixed(2) + ' Tk');
        }
        for (let i = options.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [options[i], options[j]] = [options[j], options[i]];
        }

        const numOptions = options.length;
        const arcSize = (2 * Math.PI) / numOptions;

        // Draw the Wheel
        function drawWheel() {
            // Updated coordinates for the 800x800 high-res canvas
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const radius = canvas.width / 2;

            for(let i = 0; i < numOptions; i++) {
                const angle = i * arcSize;
                
                ctx.beginPath();
                ctx.arc(centerX, centerY, radius, angle, angle + arcSize, false);
                ctx.lineTo(centerX, centerY);
                
                ctx.fillStyle = (i % 2 === 0) ? 'var(--wheel-green)' : 'var(--wheel-red)';
                ctx.fill();

                ctx.lineWidth = 2; // Thicker lines for higher res
                ctx.strokeStyle = '#d4af37'; 
                ctx.stroke();

                ctx.save();
                ctx.translate(centerX, centerY);
                ctx.rotate(angle + arcSize / 2);
                ctx.textAlign = "right";
                ctx.fillStyle = "#f9d976"; 
                // Scaled up font size for 800px canvas
                ctx.font = "bold 24px 'Amiri', serif";
                ctx.fillText(options[i], radius - 25, 8);
                ctx.restore();
            }
            
            // Ornate Center Hub
            ctx.beginPath();
            ctx.arc(centerX, centerY, 60, 0, 2 * Math.PI, false); // Scaled up
            ctx.fillStyle = '#0a1815';
            ctx.fill();
            ctx.lineWidth = 6;
            ctx.strokeStyle = '#d4af37';
            ctx.stroke();
            
            // Inner gold dot
            ctx.beginPath();
            ctx.arc(centerX, centerY, 15, 0, 2 * Math.PI, false); // Scaled up
            ctx.fillStyle = '#d4af37';
            ctx.fill();
        }

        document.fonts.ready.then(drawWheel);

        // Spin Logic
        if (localStorage.getItem('salamiClaimed') === 'true') {
            spinBtn.disabled = true;
            spinBtn.innerText = "Already Claimed";
        }

        let currentRotation = 0;

        spinBtn.addEventListener('click', () => {
            if (localStorage.getItem('salamiClaimed') === 'true') return;

            spinBtn.disabled = true;
            spinBtn.innerText = "Spinning...";

            const extraSpins = (Math.floor(Math.random() * 5) + 5) * 360;
            const randomDegree = Math.floor(Math.random() * 360);
            const totalRotation = extraSpins + randomDegree;
            
            currentRotation += totalRotation;
            canvas.style.transform = `rotate(${currentRotation}deg)`;

            setTimeout(() => {
                const actualDegree = currentRotation % 360;
                const sliceIndex = Math.floor((360 - actualDegree) / (360 / numOptions)) % numOptions;
                const winnings = options[sliceIndex];
                
                triggerGoldConfetti();
                showModal(winnings);
                
                localStorage.setItem('salamiClaimed', 'true');
                spinBtn.innerText = "Already Claimed";

            }, 4000); 
        });

        // Modal & Confetti Functions
        function showModal(amount) {
            modalAmount.innerText = amount;
            resultModal.style.display = 'flex';
            setTimeout(() => {
                modalBox.classList.add('show');
            }, 10);
        }

        closeModalBtn.addEventListener('click', () => {
            modalBox.classList.remove('show');
            setTimeout(() => {
                resultModal.style.display = 'none';
            }, 400); 
        });

        function triggerGoldConfetti() {
            const duration = 3000;
            const end = Date.now() + duration;

            (function frame() {
                confetti({
                    particleCount: 5,
                    angle: 60,
                    spread: 55,
                    origin: { x: 0 },
                    colors: ['#d4af37', '#f9d976', '#ffffff'] 
                });
                confetti({
                    particleCount: 5,
                    angle: 120,
                    spread: 55,
                    origin: { x: 1 },
                    colors: ['#d4af37', '#f9d976', '#ffffff']
                });

                if (Date.now() < end) {
                    requestAnimationFrame(frame);
                }
            }());
        }

        // Secret Reset Button
        document.getElementById('resetBtn').addEventListener('click', () => {
            localStorage.removeItem('salamiClaimed');
            location.reload(); 
        });
    </script>
</body>
</html>
